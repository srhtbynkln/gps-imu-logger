<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#2A4470"/>
      <stop offset="1" stop-color="#1B2A45"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AA6FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- GPS orbit ring + satellite -->
  <ellipse cx="256" cy="278" rx="176" ry="66" transform="rotate(-22 256 278)"
           fill="none" stroke="#6FB0FF" stroke-opacity="0.40" stroke-width="7"/>
  <circle cx="408" cy="214" r="11" fill="#8FC2FF"/>

  <!-- IMU gyroscope rings (motion sensor) -->
  <g fill="none" stroke="#F6A623" stroke-width="20" stroke-linecap="round">
    <ellipse cx="256" cy="300" rx="150" ry="58" transform="rotate(34 256 300)"/>
    <ellipse cx="256" cy="300" rx="150" ry="58" transform="rotate(-34 256 300)"/>
  </g>

  <!-- GPS location pin -->
  <g transform="translate(136,76) scale(10)">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
          fill="url(#pin)" stroke="#ffffff" stroke-width="0.7"/>
    <circle cx="12" cy="9" r="2.7" fill="#ffffff"/>
  </g>

  <!-- hybrid fusion accent -->
  <circle cx="256" cy="300" r="13" fill="#22C55E"/>
</svg>

